<span class="textstyle2">Soviet State Zero – Resumo da narrativa</span><span class="textstyle3"><br/>Em um país fictício inspirado no bloco soviético, uma guerra inesperada explode entre nações vizinhas. Durante os combates, um ataque a uma área industrial próxima a uma usina nuclear causa uma explosão que aquece o reator e libera radiação pelo ar. A região entra em colapso: cidades são evacuadas às pressas, mas muitos moradores se recusam a abandonar seus lares, ficando presos em meio ao caos e à contaminação.<br/><br/>O protagonista é um jovem que, para sobreviver, precisa usar armas e enfrentar soldados e mercenários que exploram os recursos da zona devastada. Sua motivação é dupla: evacuar sua família e reencontrar o amigo de infância, separado dele pela guerra. Antes do conflito, os dois eram inseparáveis, quase irmãos, mas o destino os colocou em cidades diferentes — justamente na área mais atingida pelo desastre.<br/><br/>O mapa retrata os momentos logo após o incidente nuclear: neve cobrindo tudo, sirenes ecoando, prédios pesados e abandonados, tanques enferrujados, linhas de trem que serviram para evacuação ou transporte militar. Animais mutados vagam pela região, mas não são hostis — apenas sobreviventes adaptados ao ambiente radioativo.<br/><br/>O jogador explora esse cenário hostil, sentindo a solidão, o perigo invisível da radiação e a tensão constante da guerra. Não há monstros sobrenaturais: o verdadeiro inimigo é humano, e a luta é pela sobrevivência e pela esperança de reunir aqueles que ainda restam.</span>      </div>
